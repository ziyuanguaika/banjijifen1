    <style>
        @keyframes slideInBounce {
            0% {
                transform: translateX(100%) scale(0.8);
                opacity: 0;
            }
            50% {
                transform: translateX(-10px) scale(1.1);
                opacity: 1;
            }
            100% {
                transform: translateX(0) scale(1);
                opacity: 1;
            }
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .point-feedback-enter {
            animation: slideInBounce 0.5s ease-out;
        }

        .point-pulse {
            animation: pulse 0.6s ease-in-out 3;
        }

        /* 积分数字变化动画 */
        @keyframes numberChange {
            0% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.15);
            }
            50% {
                transform: scale(1.05);
            }
            75% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        .number-change {
            display: inline-block;
            transition: all 0.3s ease-in-out;
        }

        /* 同步状态提示框样式 */
        .sync-status-bar {
            position: fixed;
            top: 10px;
            right: 10px;
            background: white;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10000;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .sync-status-bar.syncing {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .sync-status-bar.synced {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #2d3748;
        }

        .sync-status-bar.error {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
        }

        /* 旋转加载动画 */
        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .sync-icon {
            width: 18px;
            height: 18px;
            display: inline-block;
        }

        .sync-icon.spinning {
            animation: rotate 1s linear infinite;
        }

        /* 渐入渐出动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }

        .sync-status-bar.fade-in {
            animation: fadeIn 0.3s ease;
        }

        .sync-status-bar.fade-out {
            animation: fadeOut 0.3s ease;
        }

        /* 脉冲效果 */
        @keyframes syncPulse {
            0%, 100% {
                box-shadow: 0 2px 12px rgba(102, 126, 234, 0.3);
            }
            50% {
                box-shadow: 0 2px 20px rgba(102, 126, 234, 0.6);
            }
        }

        .sync-status-bar.syncing {
            animation: syncPulse 2s ease-in-out infinite;
        }

        /* 成功勾选动画 */
        @keyframes checkmark {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .sync-icon.check {
            animation: checkmark 0.5s ease;
        }

        // IndexedDB 工具函数（存储头像原图）
        const initAvatarDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('ClassAvatarsDB', 1);
                
                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(request.result);
                
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains('avatars')) {
                        db.createObjectStore('avatars', { keyPath: 'studentId' });
                    }
                };
            });
        };

        const saveAvatarToIndexedDB = async (studentId, imageData) => {
            const db = await initAvatarDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['avatars'], 'readwrite');
                const store = transaction.objectStore('avatars');
                const request = store.put({ studentId, imageData });
                
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        };

            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['avatars'], 'readonly');
                const store = transaction.objectStore('avatars');
                const request = store.get(studentId);
                
                request.onsuccess = () => resolve(request.result?.imageData || null);

        // 图片压缩函数
        const compressImage = (file, maxWidth = 150, maxHeight = 150, quality = 0.7) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        
                        // 计算缩放比例
                        if (width > height) {
                            if (width > maxWidth) {
                                height = height * (maxWidth / width);
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width = width * (maxHeight / height);
                                height = maxHeight;
                            }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // 转换为 Base64（缩略图，目标 < 10KB）
                        const thumbnail = canvas.toDataURL('image/jpeg', quality);
                        
                        // 原图也压缩一下（目标 < 100KB）
                        const fullImage = canvas.toDataURL('image/jpeg', 0.8);
                        
                        resolve({ thumbnail, fullImage });
                    };
                    
                    img.onerror = reject;
                };
                
                reader.onerror = reject;
            });
        };

            // 导出历史数据（按日期范围）
            const exportHistoryData = (period = 'today', customStartDate = null, customEndDate = null) => {
                let filteredHistory = [];
                let periodName = '';

                // 1. 按 period 参数筛选时间范围
                if (period === 'today') {
                    filteredHistory = getHistoryInPeriod('daily');
                    periodName = '当天';
                } else if (period === 'week') {
                    filteredHistory = getHistoryInPeriod('weekly');
                    periodName = '本周';
                } else if (period === 'month') {
                    filteredHistory = getHistoryInPeriod('monthly');
                    periodName = '本月';
                } else if (period === 'custom' && customStartDate && customEndDate) {
                    const start = new Date(customStartDate);
                    const end = new Date(customEndDate);
                    end.setHours(23, 59, 59, 999);
                    filteredHistory = history.filter(h => {
                        const recordDate = new Date(h.time);
                        return recordDate >= start && recordDate <= end;
                    });
                    periodName = `${customStartDate}至${customEndDate}`;
                }

                // 2. 排除兑换记录
                const filteredHistoryWithoutRedeem = filteredHistory.filter(h => h.type !== 'redeem');

                // 3. 按学生姓名分组统计
                const studentStats = {};
                filteredHistoryWithoutRedeem.forEach(record => {
                    const studentName = record.studentName;
                    if (!studentStats[studentName]) {
                        const student = students.find(s => s.name === studentName);
                        studentStats[studentName] = {
                            name: studentName,
                            group: student ? student.group : '未知',
                            totalPoints: 0,
                            addPoints: 0,
                            subtractPoints: 0,
                            records: []
                        };
                    }
                    studentStats[studentName].totalPoints += record.points;
                    if (record.points > 0) {
                        studentStats[studentName].addPoints += record.points;
                    } else {
                        studentStats[studentName].subtractPoints += Math.abs(record.points);
                    }
                    studentStats[studentName].records.push(record);
                });

                // 4. 按小组分组统计
                const groupStats = {};
                Object.values(studentStats).forEach(student => {
                    if (!groupStats[student.group]) {
                        groupStats[student.group] = {
                            totalPoints: 0,
                            addPoints: 0,
                            subtractPoints: 0,
                            studentCount: 0,
                            students: []
                        };
                    }
                    groupStats[student.group].totalPoints += student.totalPoints;
                    groupStats[student.group].addPoints += student.addPoints;
                    groupStats[student.group].subtractPoints += student.subtractPoints;
                    groupStats[student.group].studentCount += 1;
                    groupStats[student.group].students.push(student.name);
                });

                // 5. 组号排序（'未知'排最后）
                const sortedGroups = Object.keys(groupStats).sort((a, b) => {
                    if (a === '未知') return 1;
                    if (b === '未知') return -1;
                    return Number(a) - Number(b);
                });

                // 6. 学生排序：先按组号，同组内按总分倒序
                const sortedStudents = Object.values(studentStats).sort((a, b) => {
                    const groupA = Number(a.group) || 0;
                    const groupB = Number(b.group) || 0;
                    if (groupA !== groupB) return groupA - groupB;
                    return b.totalPoints - a.totalPoints;
                });

                // 7. 构建表格数据（二维数组，6列）
                const data = [
                    ['积分统计表 - ' + periodName],
                    [],
                    ['序号', '姓名', '组别', '学生总分', '规则说明', '积分小计']
                ];

                let currentRow = 1; // 序号计数器

                sortedGroups.forEach(groupNum => {
                    const groupStudents = sortedStudents.filter(s => String(s.group) === String(groupNum));
                    if (groupStudents.length === 0) return;

                    groupStudents.forEach(student => {
                        const groupDisplay = groupNum === '未知' ? '未知' : `${groupNum}组`;
                        const studentTotalDisplay = student.totalPoints > 0 ? `+${student.totalPoints}` : student.totalPoints;

                        // 学生汇总行：序号、姓名、组别、总分填在前4列，后2列为空
                        data.push([
                            currentRow,
                            student.name,
                            groupDisplay,
                            studentTotalDisplay,
                            '',   // 规则说明（空）
                            ''    // 积分小计（空）
                        ]);

                        // 该学生的规则明细行：前4列为空，后2列填规则/小计
                        const ruleStats = {};
                        student.records.forEach(record => {
                            if (!ruleStats[record.rule]) {
                                ruleStats[record.rule] = { count: 0, totalPoints: 0 };
                            }
                            ruleStats[record.rule].count += 1;
                            ruleStats[record.rule].totalPoints += record.points;
                        });

                        Object.keys(ruleStats).forEach(rule => {
                            const stat = ruleStats[rule];
                            data.push([
                                '',  // 序号（空）
                                '',  // 姓名（空）
                                '',  // 组别（空）
                                '',  // 学生总分（空）
                                rule,
                                stat.totalPoints > 0 ? `+${stat.totalPoints}` : stat.totalPoints
                            ]);
                        });

                        currentRow++;
                    });

                    // 小组小计行
                    const group = groupStats[groupNum];
                    const groupTitle = groupNum === '未知' ? '【未知组小计】' : `【第${groupNum}组小计】`;
                    data.push(['', groupTitle, '', group.totalPoints > 0 ? `+${group.totalPoints}` : group.totalPoints, '', '']);
                    data.push([]); // 空行分隔各组
                });

                // 全班统计
                const totalAdd = sortedStudents.reduce((sum, s) => sum + s.addPoints, 0);

            // 导入源数据（JSON格式）

                    try {

                        });

                            // 检查是否有头像数据需要处理
                            const hasAvatarData = data.students.some(s => s.avatarData);

                            if (hasAvatarData) {
                                // 有头像数据，需要先生成缩略图再设置学生数据
                                let avatarCount = 0;
                                const avatarMap = {};

                                const avatarRestorePromises = data.students.map(async (student) => {
                                    if (student.avatarData && student.id) {
                                        try {
                                            // 保存到 IndexedDB
                                            await saveAvatarToIndexedDB(student.id, student.avatarData);

                                            // 同时生成缩略图
                                            return new Promise((resolve) => {
                                                const img = new Image();
                                                img.onload = () => {
                                                    const canvas = document.createElement('canvas');
                                                    const maxSize = 100;
                                                    let width = img.width;
                                                    let height = img.height;
                                                    if (width > height) {
                                                        if (width > maxSize) {
                                                            height *= maxSize / width;
                                                            width = maxSize;
                                                        }
                                                    } else {
                                                        if (height > maxSize) {
                                                            width *= maxSize / height;
                                                            height = maxSize;
                                                        }
                                                    }
                                                    canvas.width = width;
                                                    canvas.height = height;
                                                    const ctx = canvas.getContext('2d');
                                                    ctx.drawImage(img, 0, 0, width, height);
                                                    avatarMap[student.id] = canvas.toDataURL('image/jpeg', 0.7);
                                                    avatarCount++;
                                                    resolve();
                                                };
                                                img.onerror = () => resolve();
                                                img.src = student.avatarData;
                                            });
                                        } catch (e) {
                                            console.error('头像处理失败:', student.id, e);
                                        }
                                    }
                                });

                                await Promise.all(avatarRestorePromises);

                                // 生成带缩略图的学生数据

                                    ...s,
                                    avatarThumb: avatarMap[s.id] || null

                                    details.push(`${avatarCount}个头像`);

                        }
                        setTimeout(() => setUploadMessage(''), 5000);

            // 更新学生积分

                setTimeout(() => setUploadMessage(''), 2000);

            // 删除规则
            const deleteRule = async (ruleId) => {
                if (!confirm('确定要删除这条积分规则吗？')) return;
                setPointRules(prev => prev.filter(r => r.id !== ruleId));
                setUploadMessage('✅ 规则已删除');
                setTimeout(() => setUploadMessage(''), 2000);
            };

            // 兑换商品
            const redeemReward = async (studentId, reward) => {
                const student = students.find(s => s.id === studentId);
                if (!student) {
                    setUploadMessage('❌ 学生不存在');
                    setTimeout(() => setUploadMessage(''), 2000);
                    return;
                }

                const availablePoints = parseInt(student.availablePoints || 0);
                const costPoints = parseInt(reward.points || reward.cost_points);

                if (availablePoints < costPoints) {
                    setUploadMessage(`❌ 积分不足！需要 ${costPoints} 分，当前只有 ${availablePoints} 分`);
                    setTimeout(() => setUploadMessage(''), 3000);
                    return;
                }

                // 统一处理库存：undefined/99 表示无限库存
                const stock = reward.stock === undefined || reward.stock === null ? 99 : parseInt(reward.stock);
                if (stock <= 0) {
                    setUploadMessage('❌ 商品库存不足');
                    setTimeout(() => setUploadMessage(''), 2000);
                    return;
                }

                const updatedStudent = {
                    ...student,
                    // 兑换商品只减少可用积分，不改变总分
                    points: parseInt(student.points),
                    availablePoints: availablePoints - costPoints
                };

                setStudents(prev => prev.map(s =>
                    s.id === studentId ? updatedStudent : s
                ));

                const newHistory = {
                    id: Date.now() + Math.random(),
                    studentId: studentId,
                    studentName: student.name,
                    points: -costPoints,
                    rule: '兑换商品',
                    time: getLocalTime(),
                    rewardName: reward.name || reward.reward_name
                };
                setHistory(prev => [newHistory, ...prev]);

                // 更新库存（无限库存99不更新）
                if (stock !== 99) {
                    setRewards(prev => prev.map(r =>
                        r.id === reward.id ? { ...r, stock: stock - 1 } : r
                    ));
                }

                setUploadMessage(`✅ ${student.name} 兑换了 ${reward.name || reward.reward_name}`);
                setTimeout(() => setUploadMessage(''), 3000);
            };

            // 切换学生选择（多选模式）
            const toggleStudentSelection = (studentId) => {
                setSelectedStudents(prev => {
                    if (prev.includes(studentId)) {
                        return prev.filter(id => id !== studentId);
                    } else {
                        return [...prev, studentId];
                    }
                });
            };


            // 添加商品
            const addReward = async (name, points, stock) => {
                if (!name.trim()) {
                    setUploadMessage('❌ 商品名称不能为空');
                    setTimeout(() => setUploadMessage(''), 2000);
                    return;
                }
                if (isNaN(points) || points <= 0) {
                    setUploadMessage('❌ 积分必须大于0');
                    setTimeout(() => setUploadMessage(''), 2000);
                    return;
                }
                if (isNaN(stock) || stock < 0) {
                    setUploadMessage('❌ 库存不能为负数');
                    setTimeout(() => setUploadMessage(''), 2000);
                    return;
                }
                
                // 立即保存到MySQL
                if (userInfo?.classId) {
                    try {
                        const result = await callAPI('add_reward', userInfo.classId, {
                            reward: { name: name.trim(), points: parseInt(points), stock: parseInt(stock) }
                        });
                        const newId = result.id;
                        const newReward = { id: newId, name: name.trim(), points: parseInt(points), stock: parseInt(stock) };
                        setRewards(prev => [...prev, newReward]);
                        setUploadMessage(`✅ 已添加商品：${name} 并同步到服务器`);
                    } catch (error) {
                        console.error('❌ 添加商品失败:', error);
                        setUploadMessage(`❌ 添加商品失败: ${error.message}`);
                    }
                } else {
                    const newId = rewards.length > 0 ? Math.max(...rewards.map(r => r.id)) + 1 : 1;
                    setRewards(prev => [...prev, { id: newId, name: name.trim(), points: parseInt(points), stock: parseInt(stock) }]);
                    setUploadMessage(`✅ 已添加商品：${name}`);
                }
                setTimeout(() => setUploadMessage(''), 3000);
            };

            // 更新商品库存
            const updateRewardStock = async (id, stockChange) => {
                const reward = rewards.find(r => r.id === id);
                if (!reward) return;

                const currentStock = reward.stock === undefined || reward.stock === null ? 0 : parseInt(reward.stock);
                const newStock = currentStock + stockChange;
                if (newStock < 0) {
                    setUploadMessage('❌ 库存不能为负数');
                    setTimeout(() => setUploadMessage(''), 2000);
                    return;
                }

                // 更新本地状态
                setRewards(rewards.map(r => {
                    if (r.id === id) {
                        return { ...r, stock: newStock };
                    }
                    return r;
                }));

                // 立即同步到MySQL
                if (userInfo?.classId) {
                    try {
                        await callAPI('update_reward_stock', userInfo.classId, { reward_id: id, new_stock: newStock });
                        console.log('✅ 商品库存已同步');
                    } catch (error) {
                        console.error('❌ 更新库存失败:', error);
                    }
                }
            };

            // 编辑商品
            const editReward = async (id, name, points, stock) => {
                if (!name.trim()) {
                    setUploadMessage('❌ 商品名称不能为空');
                    setTimeout(() => setUploadMessage(''), 2000);
                    return;
                }
                if (isNaN(points) || points <= 0) {
                    setUploadMessage('❌ 积分必须大于0');
                    setTimeout(() => setUploadMessage(''), 2000);
                    return;
                }
                if (isNaN(stock) || stock < 0) {
                    setUploadMessage('❌ 库存不能为负数');
                    setTimeout(() => setUploadMessage(''), 2000);
                    return;
                }
                
                const updatedReward = {
                    name: name.trim(),
                    points: parseInt(points),
                    stock: parseInt(stock)
                };
                
                // 更新本地状态
                setRewards(rewards.map(r => 
                    r.id === id ? { ...r, ...updatedReward } : r
                ));
                
                // 立即同步到MySQL
                if (userInfo?.classId) {
                    try {
                        await callAPI('update_reward', userInfo.classId, { reward_id: id, reward: updatedReward });
                        setUploadMessage(`✅ 已更新商品：${name} 并同步到服务器`);

                    } catch (error) {
                        console.error('❌ 更新商品失败:', error);
                        setUploadMessage(`⚠️ 商品已更新但同步失败: ${error.message}`);
                    }
                } else {
                    setUploadMessage(`✅ 已更新商品：${name} (仅本地)`);
                }
                
                setTimeout(() => setUploadMessage(''), 3000);
            };

            // 编辑学生信息
            const editStudent = (id, name, gender, group) => {
                if (!name.trim()) {
                    setUploadMessage('❌ 学生姓名不能为空');
                    setTimeout(() => setUploadMessage(''), 2000);
                    return;
                }
                if (!gender || (gender !== 'male' && gender !== 'female')) {
                    setUploadMessage('❌ 请选择正确的性别');
                    setTimeout(() => setUploadMessage(''), 2000);
                    return;
                }
                if (isNaN(group) || group < 1) {
                    setUploadMessage('❌ 小组编号必须大于0');
                    setTimeout(() => setUploadMessage(''), 2000);
                    return;
                }
                
                const oldStudent = students.find(s => s.id === id);
                const oldGroup = oldStudent?.group;
                const newGroup = parseInt(group);
                
                setStudents(students.map(s => {
                    if (s.id !== id) return s;
                    // 判断是否使用默认emoji头像（没有自定义图片）
                    const isDefaultAvatar = !s.avatarThumb;
                    const newAvatar = isDefaultAvatar
                        ? (gender === 'female' ? '👧' : '👦')
                        : s.avatar;
                    return { ...s, name: name.trim(), gender, group: newGroup, avatar: newAvatar };
                }));
                
                if (oldGroup !== newGroup) {
                    setUploadMessage(`✅ 已更新学生信息：${name}（从第${oldGroup}组调整到第${newGroup}组，小组积分已自动重新计算）`);
                } else {
                    setUploadMessage(`✅ 已更新学生信息：${name}`);
                }
                setTimeout(() => setUploadMessage(''), 3000);
            };

            // 获取指定时间范围内的历史记录
            const getHistoryInPeriod = (period) => {
                const now = new Date();
                let startDate;
                
                switch (period) {
                    case 'daily':
                        startDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                        break;
                    case 'weekly':
                        const dayOfWeek = now.getDay();
                        const daysToMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
                        startDate = new Date(now.getTime() - daysToMonday * 24 * 60 * 60 * 1000);
                        startDate.setHours(0, 0, 0, 0);
                        break;
                    case 'monthly':
                        startDate = new Date(now.getFullYear(), now.getMonth(), 1);
                        break;
                    default:
                        return history; // 总榜返回所有历史记录
                }
                
                return history.filter(record => {
                    const recordDate = new Date(record.time);
                    return recordDate >= startDate;
                });
            };

            // 计算学生在指定时间范围内的积分变化（排除兑换记录）
            const getStudentPointsInPeriod = (studentId, period) => {
                const periodHistory = getHistoryInPeriod(period);
                return periodHistory
                    .filter(record => {
                        // 排除兑换类型的记录，同时兼容 studentId 和 studentName 两种匹配方式
                        const student = students.find(s => s.id === studentId);
                        return student && (record.studentId === studentId || record.studentName === student.name) && record.type !== 'redeem';
                    })
                    .reduce((total, record) => total + record.points, 0);
            };

            // 获取排序后的学生列表（支持不同周期）
            const getSortedStudents = (period = 'total') => {
                if (period === 'total') {
                    // 总榜使用历史总积分排序
                    return [...students].sort((a, b) => b.points - a.points);
                } else {
                    // 周期榜使用周期积分变化排序
                    return [...students].map(student => ({
                        ...student,
                        periodPoints: getStudentPointsInPeriod(student.id, period)
                    })).sort((a, b) => b.periodPoints - a.periodPoints);
                }
            };

            // 获取小组积分（支持不同周期）
            const getGroupPoints = (period = 'total') => {
                const groups = {};

                if (period === 'total') {
                    // 总榜使用历史总积分
                    students.forEach(s => {
                        const groupKey = String(s.group); // 统一转为字符串作为key
                        groups[groupKey] = (groups[groupKey] || 0) + s.points;
                    });
                } else {
                    // 周期榜使用周期积分变化
                    students.forEach(s => {
                        const groupKey = String(s.group);
                        const periodPoints = getStudentPointsInPeriod(s.id, period);
                        groups[groupKey] = (groups[groupKey] || 0) + periodPoints;
                    });
                }

                return Object.entries(groups).map(([groupKey, points]) => {
                    const groupNum = parseInt(groupKey);
                    return {
                        group: groupNum,
                        points,
                        count: students.filter(s => s.group == groupNum).length
                    };
                }).sort((a, b) => b.points - a.points);
            };

            // 计算并列排名（相同分数显示相同名次）
            const getRank = (list, index, scoreKey = 'points') => {
                if (index === 0) return 1;
                
                const currentScore = scoreKey === 'points' ? list[index].points : 
                                     scoreKey === 'periodPoints' ? list[index].periodPoints : list[index].points;
                const prevScore = scoreKey === 'points' ? list[index - 1].points : 
                                  scoreKey === 'periodPoints' ? list[index - 1].periodPoints : list[index - 1].points;
                
                if (currentScore === prevScore) {
                    return getRank(list, index - 1, scoreKey);
                }
                return index + 1;
            };

            // 过滤学生
            const filteredStudents = students.filter(s => 
                s.name.toLowerCase().includes(searchTerm.toLowerCase())
            );

            const groups = [...new Set(students.map(s => parseInt(s.group)))].sort((a, b) => a - b);
            
            // 数字转汉字
            const numberToChinese = (num) => {
                const chinese = ['', '一', '二', '三', '四', '五', '六', '七', '八', '九', '十'];
                if (num <= 10) return chinese[num];
                return num.toString();
            };

            // 添加学生
            const handleAddStudent = () => {
                if (!newStudent.name.trim()) {
                    setUploadMessage('❌ 学生姓名不能为空');
                    setTimeout(() => setUploadMessage(''), 2000);
                    return;
                }
                const gender = newStudent.gender === '女' ? 'female' : 'male';
                const newId = students.length > 0 ? Math.max(...students.map(s => typeof s.id === 'number' ? s.id : 0)) + 1 : 1;
                const student = {
                    id: newId,
                    name: newStudent.name.trim(),
                    gender,
                    group: parseInt(newStudent.group) || 1,
                    points: parseInt(newStudent.points) || 0,
                    availablePoints: parseInt(newStudent.points) || 0,
                    avatar: gender === 'female' ? '👧' : '👦',
                };
                setStudents(prev => [...prev, student]);
                setNewStudent({ name: '', gender: '男', group: 1, points: 0 });
                setShowAddStudentDialog(false);
                setUploadMessage(`✅ 已添加学生：${student.name}`);
                setTimeout(() => setUploadMessage(''), 2000);
            };

            // 上传学生头像
            const uploadStudentAvatar = async (studentId, file) => {
                if (!file) return;

                // 检查文件类型
                if (!file.type.startsWith('image/')) {
                    setUploadMessage('❌ 请选择图片文件');
                    setTimeout(() => setUploadMessage(''), 2000);
                    return;
                }

                // 检查文件大小（限制5MB）
                if (file.size > 5 * 1024 * 1024) {
                    setUploadMessage('❌ 图片大小不能超过5MB');
                    setTimeout(() => setUploadMessage(''), 2000);
                    return;
                }

                setUploadMessage('📷 正在处理头像...');
                try {
                    // 读取并压缩图片
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        const img = new Image();
                        img.onload = async () => {
                            // 计算压缩后的尺寸（最大边长500px）
                            const maxSize = 500;
                            let width = img.width;
                            let height = img.height;

                            if (width > height) {
                                if (width > maxSize) {
                                    height *= maxSize / width;
                                    width = maxSize;
                                }
                            } else {
                                if (height > maxSize) {
                                    width *= maxSize / height;
                                    height = maxSize;
                                }
                            }

                            // 创建 canvas 进行压缩
                            const canvas = document.createElement('canvas');
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);

                            // 转换为 Base64（JPEG质量0.8）
                            const imageData = canvas.toDataURL('image/jpeg', 0.8);

                            // 创建缩略图（100px）
                            const thumbCanvas = document.createElement('canvas');
                            const thumbSize = 100;
                            let thumbWidth = width;
                            let thumbHeight = height;
                            if (thumbWidth > thumbHeight) {
                                if (thumbWidth > thumbSize) {
                                    thumbHeight *= thumbSize / thumbWidth;
                                    thumbWidth = thumbSize;
                                }
                            } else {
                                if (thumbHeight > thumbSize) {
                                    thumbWidth *= thumbSize / thumbHeight;
                                    thumbHeight = thumbSize;
                                }
                            }
                            thumbCanvas.width = thumbWidth;
                            thumbCanvas.height = thumbHeight;
                            const thumbCtx = thumbCanvas.getContext('2d');
                            thumbCtx.drawImage(img, 0, 0, thumbWidth, thumbHeight);
                            const thumbData = thumbCanvas.toDataURL('image/jpeg', 0.7);

                            // 保存到 IndexedDB
                            await saveAvatarToIndexedDB(studentId, imageData);

                            // 更新学生状态
                            setStudents(prev => prev.map(s =>
                                s.id === studentId ? { ...s, avatarThumb: thumbData } : s
                            ));

                            setUploadMessage('✅ 头像上传成功');
                            setTimeout(() => setUploadMessage(''), 2000);
                        };
                        img.onerror = () => {
                            setUploadMessage('❌ 图片加载失败');
                            setTimeout(() => setUploadMessage(''), 2000);
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                } catch (e) {
                    console.error('头像上传失败:', e);
                    setUploadMessage('❌ 头像上传失败');
                    setTimeout(() => setUploadMessage(''), 2000);
                }
            };

            // 删除学生头像
            const deleteStudentAvatar = async (studentId) => {
                setStudents(prev => prev.map(s =>
                    s.id === studentId ? { ...s, avatar: s.gender === 'female' ? '👧' : '👦', avatarThumb: null } : s
                ));
                try { await deleteAvatarFromIndexedDB(studentId); } catch (e) {}
                setUploadMessage('✅ 头像已删除');
                setTimeout(() => setUploadMessage(''), 2000);
            };

            // 修改密码
            const handleChangePassword = async () => {
                const { oldPassword, newPassword, confirmPassword } = passwordForm;
                if (!oldPassword || !newPassword || !confirmPassword) {
                    setUploadMessage('❌ 请填写完整信息');
                    setTimeout(() => setUploadMessage(''), 2000);
                    return;
                }
                if (newPassword !== confirmPassword) {
                    setUploadMessage('❌ 两次输入的新密码不一致');
                    setTimeout(() => setUploadMessage(''), 2000);
                    return;
                }
                if (newPassword.length < 6) {
                    setUploadMessage('❌ 新密码至少需要6位');
                    setTimeout(() => setUploadMessage(''), 2000);
                    return;
                }
                try {
                    const response = await fetch(PHP_API.changePassword, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            class_id: userInfo.classId,
                            old_password: oldPassword,
                            new_password: newPassword,
                        }),
                    });
                    const result = await response.json();
                    if (!result.success) {
                        setUploadMessage('❌ ' + result.message);
                        setTimeout(() => setUploadMessage(''), 3000);
                        return;
                    }
                    setShowPasswordDialog(false);
                    setPasswordForm({ oldPassword: '', newPassword: '', confirmPassword: '' });
                    setUploadMessage('✅ 密码修改成功');
                    setTimeout(() => setUploadMessage(''), 3000);
                } catch (e) {
                    setUploadMessage('❌ 修改失败：' + e.message);
                    setTimeout(() => setUploadMessage(''), 3000);
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-teal-50 to-cyan-50">
                    {/* 同步状态提示条 */}
                    {syncStatus !== 'idle' && (
                        <div className={`sync-status-bar ${syncStatus} fade-in`}>
                            <div className={`sync-icon ${syncStatus === 'syncing' ? 'spinning' : syncStatus === 'synced' ? 'check' : ''}`}>
                                {syncStatus === 'syncing' && '⟳'}
                                {syncStatus === 'synced' && '✓'}
                                {syncStatus === 'error' && '⚠'}
                            </div>
                            <span>{syncMessage}</span>
                        </div>
                    )}
                    
                    {/* 头部 */}
                    <div className="bg-gradient-to-r from-teal-400 to-cyan-400 p-6 shadow-lg">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex items-center justify-between mb-2">
                                <div className="flex items-center gap-3">
                                    <div className="text-4xl">🍃</div>
                                    <h1 className="text-3xl font-bold text-white">班级积分系统 - 云端版</h1>
                                </div>
                                <div className="flex items-center gap-4">
                                    {userInfo && (
                                        <div className="text-white text-sm">
                                            <span className="opacity-75">班级：</span>
                                            <span className="font-semibold">{userInfo.className || userInfo.classId}</span>
                                        </div>
                                    )}
                                    <button 
                                        onClick={refreshFromCloud}
                                        disabled={syncStatus === 'syncing'}
                                        className={`flex items-center gap-2 px-4 py-2 bg-white bg-opacity-20 hover:bg-opacity-30 text-white rounded-lg transition-all ${syncStatus === 'syncing' ? 'opacity-50 cursor-not-allowed' : ''}`}
                                        title="从云端刷新所有数据"
                                    >
                                        <RefreshCw size={18} className={syncStatus === 'syncing' ? 'sync-icon spinning' : ''} />
                                        <span>{syncStatus === 'syncing' ? '刷新中...' : '刷新数据'}</span>
                                    </button>
                                    <button 
                                        onClick={forceSync}
                                        disabled={syncStatus === 'syncing'}
                                        className={`flex items-center gap-2 px-4 py-2 bg-white bg-opacity-20 hover:bg-opacity-30 text-white rounded-lg transition-all ${syncStatus === 'syncing' ? 'opacity-50 cursor-not-allowed' : ''}`}
                                        title="将本地数据强制上传到云端（包括头像）"
                                    >
                                        <Cloud size={18} />
                                        <span>{syncStatus === 'syncing' ? '上传中...' : '上传数据'}</span>
                                    </button>
                                    <button 
                                        onClick={() => setShowPasswordDialog(true)}
                                        className="flex items-center gap-2 px-4 py-2 bg-white bg-opacity-20 hover:bg-opacity-30 text-white rounded-lg transition-all"
                                    >
                                        <Settings size={18} />
                                        <span>修改密码</span>
                                    </button>
                                    <button 
                                        onClick={onLogout}
                                        className="flex items-center gap-2 px-4 py-2 bg-white bg-opacity-20 hover:bg-opacity-30 text-white rounded-lg transition-all"
                                    >
                                        <LogOut size={18} />
                                        <span>退出登录</span>
                                    </button>
                                </div>
                            </div>
                            <p className="text-teal-50 flex items-center gap-2">
                                <Trophy size={16} />
                                支持Excel表格导入导出，数据云端同步
                            </p>
                        </div>
                    </div>

                    {/* 上传消息提示 */}
                    {uploadMessage && (
                        <div className="max-w-7xl mx-auto px-6 pt-4">
                            <div className={`p-4 rounded-lg ${uploadMessage.includes('✅') ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                                {uploadMessage}
                            </div>
                        </div>
                    )}

                    {/* 积分操作反馈提示 */}
                    {pointFeedback && (
                        <div className="fixed top-24 right-6 z-50 point-feedback-enter">
                            <div className={`p-6 rounded-xl shadow-2xl border-4 point-pulse ${
                                pointFeedback.isPositive 
                                    ? 'bg-gradient-to-r from-green-400 to-emerald-500 border-green-300' 
                                    : 'bg-gradient-to-r from-red-400 to-rose-500 border-red-300'
                            }`}>
                                <div className="flex items-center gap-4">
                                    <div className="text-5xl">
                                        {pointFeedback.isPositive ? '🎉' : '⚠️'}
                                    </div>
                                    <div className="text-white">
                                        <div className="text-3xl font-bold mb-1">
                                            {pointFeedback.isPositive ? '+' : ''}{pointFeedback.points} 分
                                        </div>
                                        <div className="text-xl font-semibold">
                                            {pointFeedback.studentName}
                                        </div>
                                        <div className="text-sm opacity-90 mt-1">
                                            {pointFeedback.ruleName}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
