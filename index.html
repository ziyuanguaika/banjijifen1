                                        // 构建等级说明文字（放在左边第一列）
                                        const gradeLegendText = '优秀：A+\n良好：A\n合格：B+\n勉强合格：B\n不合格：C';
                                        
                                        // 计算需要多少组（每组10个学生，占2行）
                                        const studentsPerRow = 10;
                                        const totalGroups = Math.ceil(sortedStudents.length / studentsPerRow);
                                        
                                        // 为每组学生生成2行（序号行+作业记录行）
                                        for (let groupIndex = 0; groupIndex < totalGroups; groupIndex++) {
                                            const startIndex = groupIndex * studentsPerRow;
                                            const endIndex = Math.min(startIndex + studentsPerRow, sortedStudents.length);
                                            
                                            // 第1行：学生序号
                                            // 只有第一组的第一行才在第一列放等级说明，其他行留空
                                            const numberRow = [groupIndex === 0 ? gradeLegendText : ''];
                                            for (let i = startIndex; i < endIndex; i++) {
                                                numberRow.push(i + 1); // 直接用数字，不转字符串
                                            }
                                            // 如果不足10个学生，补齐空格
                                            while (numberRow.length < studentsPerRow + 1) {
                                                numberRow.push('');
                                            }
                                            sheetData.push(numberRow);
                                            
                                            // 第2行：作业记录（显示实际等级）
                                            // 第一列留空（等级说明通过合并单元格垂直显示）
                                            const workRow = [''];
                                            for (let i = startIndex; i < endIndex; i++) {
                                                const student = sortedStudents[i];
                                                const studentName = student.name;
                                                const workRecords = studentWorkMap[studentName] || [];
                                                
                                                // 显示所有等级，有什么显示什么，用顿号分隔
                                                let displayText = '';
                                                if (workRecords.length > 0) {
                                                    // 过滤掉空值并去除首尾空格
                                                    const validRecords = workRecords
                                                        .filter(grade => grade !== null && grade !== undefined && String(grade).trim() !== '')
                                                        .map(grade => String(grade).trim());
                                                    
                                                    displayText = validRecords.join('、');
                                                }
                                                
                                                workRow.push(displayText);
                                            }
                                            // 如果不足10个学生，补齐空格
                                            while (workRow.length < studentsPerRow + 1) {
                                                workRow.push('');
                                            }
                                            sheetData.push(workRow);
                                        }
                                        
                                        // 情况反馈 - 按作业项目统计当天作业情况
                                        // 等级权重映射（用于比较进步和退步）- 包含所有可能的等级
                                        const gradeWeight = { 
                                            'A+': 6, 
                                            'A': 5, 
                                            'A-': 4, 
                                            'B+': 3, 
                                            'B': 2, 
                                            'B-': 1.5, 
                                            'C+': 1.2,
                                            'C': 1, 
                                            'C-': 0.8,
                                            'D': 0.5
                                        };
                                        
                                        // 按作业项目分组记录
                                        const homeworkProjectsMap = {}; // { 项目名称: { 学生名: 等级 } }
                                        daySubjectRecords.forEach(record => {
                                            if (!record || !record.rule || !record.studentName) return;
                                            
                                            // 提取作业项目名称（去掉等级部分）
                                            let projectName = record.rule;
                                            const { grade } = parseHomeworkRule(record.rule);
                                            
                                            // 如果有等级，去掉等级部分得到纯项目名
                                            if (grade && gradeWeight[grade.toUpperCase()]) {
                                                projectName = record.rule.replace(grade, '').trim();
                                            }
                                            
                                            // 初始化项目
                                            if (!homeworkProjectsMap[projectName]) {
                                                homeworkProjectsMap[projectName] = {};
                                            }
                                            
                                            // 记录学生的等级
                                            if (grade) {
                                                homeworkProjectsMap[projectName][record.studentName] = grade.toUpperCase().trim();
                                            }
                                        });
                                        
                                        // 获取本周内每个项目上一次有作业记录的日期数据（用于对比进步/退步）
                                        const currentDateIndex = sortedDates.indexOf(dateKey);
                                        
                                        // 为每个作业项目找到其上一次有记录的日期
                                        // { 项目名称: { 学生名: 等级 } }
                                        let previousHomeworkProjectsMap = {};
                                        
                                        // 遍历当天的所有作业项目
                                        Object.keys(homeworkProjectsMap).forEach(projectName => {
                                            // 从当前日期往前查找，找到该项目最近一次有记录的日期
                                            for (let i = currentDateIndex - 1; i >= 0; i--) {
                                                const checkDateKey = sortedDates[i];
                                                const checkDayRecords = recordsByDate[checkDateKey];
                                                
                                                const checkDaySubjectRecords = checkDayRecords.filter(r => {
                                                    if (!r || !r.rule) return false;
                                                    const { subject: recordSubject } = parseHomeworkRule(r.rule);
                                                    return recordSubject === subject;
                                                });
                                                
                                                // 查找该日期是否有当前项目的记录
                                                let foundProject = false;
                                                checkDaySubjectRecords.forEach(record => {
                                                    if (!record || !record.rule || !record.studentName) return;
                                                    
                                                    // 提取作业项目名称
                                                    let checkProjectName = record.rule;
                                                    const { grade } = parseHomeworkRule(record.rule);
                                                    
                                                    if (grade && gradeWeight[grade.toUpperCase()]) {
                                                        checkProjectName = record.rule.replace(grade, '').trim();
                                                    }
                                                    
                                                    // 如果是同一个项目
                                                    if (checkProjectName === projectName) {
                                                        foundProject = true;
                                                        
                                                        if (!previousHomeworkProjectsMap[projectName]) {
                                                            previousHomeworkProjectsMap[projectName] = {};
                                                        }
                                                        
                                                        if (grade) {
                                                            previousHomeworkProjectsMap[projectName][record.studentName] = grade.toUpperCase().trim();
                                                        }
                                                    }
                                                });
                                                
                                                // 如果找到该项目的历史记录，就停止继续往前查找
                                                if (foundProject) {
                                                    break;
                                                }
                                            }
                                        });
                                        
                                        // 判断是否为周一（不需要统计进步和退步）
                                        const currentDate = new Date(dateKey);
                                        const isMonday = currentDate.getDay() === 1;
                                        
                                        // 为每个作业项目统计优秀、良好、进步、退步、未交名单
                                        const projectStatistics = {}; // { 项目名: { excellent: [], good: [], improve: [], regress: [], missing: [] } }
                                        
                                        // 首先统计未交作业（从原始记录中查找包含"不交"、"未交"、"没交"的记录）
                                        const missingHomeworkMap = {}; // { 项目名: [学生序号] }
                                        daySubjectRecords.forEach(record => {
                                            if (!record || !record.rule || !record.studentName) return;
                                            
                                            // 检查是否是未交作业记录
                                            if (record.rule.includes('不交') || record.rule.includes('未交') || record.rule.includes('没交')) {
                                                // 提取作业项目名称（去掉"不交"、"未交"、"没交"等关键词）
                                                let projectName = record.rule
                                                    .replace(/不交/g, '')
                                                    .replace(/未交/g, '')
                                                    .replace(/没交/g, '')
                                                    .trim();
                                                
                                                if (!missingHomeworkMap[projectName]) {
                                                    missingHomeworkMap[projectName] = [];
                                                }
                                                
                                                // 找到学生序号
                                                const studentIndex = sortedStudents.findIndex(s => s.name === record.studentName);
                                                if (studentIndex !== -1) {
                                                    const studentNumber = studentIndex + 1;
                                                    if (!missingHomeworkMap[projectName].includes(studentNumber)) {
                                                        missingHomeworkMap[projectName].push(studentNumber);
                                                    }
                                                }
                                            }
                                        });
                                        
                                        Object.keys(homeworkProjectsMap).forEach(projectName => {
                                            const projectStudents = homeworkProjectsMap[projectName];
                                            const previousProjectStudents = previousHomeworkProjectsMap[projectName] || {};
                                            
                                            projectStatistics[projectName] = {
                                                excellent: [],
                                                good: [],
                                                improve: [],
                                                regress: [],
                                                missing: missingHomeworkMap[projectName] || []
                                            };
                                            
                                            // 遍历所有学生，统计该项目的情况
                                            sortedStudents.forEach((student, index) => {
                                                const studentName = student.name;
                                                const studentNumber = index + 1;
                                                const currentGrade = projectStudents[studentName];
                                                
                                                if (!currentGrade) return; // 该学生没有这个项目的记录，跳过
                                                
                                                const currentWeight = gradeWeight[currentGrade] || 0;
                                                
                                                // 统计优秀和良好名单
                                                if (currentGrade === 'A+') {
                                                    projectStatistics[projectName].excellent.push(studentNumber);
                                                } else if (currentGrade === 'A') {
                                                    projectStatistics[projectName].good.push(studentNumber);
                                                }
                                                
                                                // 统计进步和退步（非周一且有该项目的历史数据）
                                                if (!isMonday) {
                                                    const previousGrade = previousProjectStudents[studentName];
                                                    if (previousGrade) {
                                                        const previousWeight = gradeWeight[previousGrade] || 0;
                                                        
                                                        if (currentWeight > previousWeight) {
                                                            projectStatistics[projectName].improve.push(studentNumber);
                                                        } else if (currentWeight < previousWeight) {
                                                            projectStatistics[projectName].regress.push(studentNumber);
                                                        }
                                                    }
                                                }
                                            });
                                        });
                                        
                                        // 处理只有未交记录而没有评分记录的项目
                                        Object.keys(missingHomeworkMap).forEach(projectName => {
                                            if (!projectStatistics[projectName]) {
                                                projectStatistics[projectName] = {
                                                    excellent: [],
                                                    good: [],
                                                    improve: [],
                                                    regress: [],
                                                    missing: missingHomeworkMap[projectName]
                                                };
                                            }
                                        });
                                        
                                        // 按作业项目生成反馈文本
                                        const feedbackParts = [];
                                        
                                        Object.keys(projectStatistics).forEach(projectName => {
                                            const stats = projectStatistics[projectName];
                                            
                                            // 1. 优秀名单（A+）
                                            if (stats.excellent.length > 0) {
                                                feedbackParts.push(`【${projectName}】优秀(A+)：${stats.excellent.join('、')}`);
                                            }
                                            
                                            // 2. 良好名单（A）
                                            if (stats.good.length > 0) {
                                                feedbackParts.push(`【${projectName}】良好(A)：${stats.good.join('、')}`);
                                            }
                                            
                                            // 3. 进步名单
                                            if (!isMonday && stats.improve.length > 0) {
                                                feedbackParts.push(`【${projectName}】进步：${stats.improve.join('、')}`);
                                            }
                                            
                                            // 4. 退步名单
                                            if (!isMonday && stats.regress.length > 0) {
                                                feedbackParts.push(`【${projectName}】退步：${stats.regress.join('、')}`);
                                            }
                                            
                                            // 5. 未交作业名单
                                            if (stats.missing.length > 0) {
                                                feedbackParts.push(`【${projectName}】未交作业：${stats.missing.join('、')}`);
                                            }
                                        });
                                        
                                        // 如果没有任何反馈，显示默认信息
                                        const feedbackText = feedbackParts.length > 0 
                                            ? '情况反馈：' + feedbackParts.join('  ') 
                                            : '情况反馈：本日无特别情况';
                                        
                                        sheetData.push([feedbackText, '', '', '', '', '', '', '', '', '', '']);
                                        
                                        // 每个日期区块后添加一个空行分隔（包括最后一天）
                                        sheetData.push(['', '', '', '', '', '', '', '', '', '', '']);
                                    });
                                    
                                    // 底部汇总
                                    sheetData.push([]);
                                    sheetData.push([`第____周作业情况总结：`]);
                                    sheetData.push([]);
                                    sheetData.push([]);
                                    sheetData.push([]);
                                    
                                    // 创建worksheet
                                    const ws = XLSX.utils.aoa_to_sheet(sheetData);
                                    
                                    // 确保等级说明单元格正确包含换行符（关键修复）
                                    Object.keys(ws).forEach(cellAddress => {
                                        if (cellAddress[0] === '!') return; // 跳过特殊属性
                                        const cell = ws[cellAddress];
                                        if (cell && cell.v && typeof cell.v === 'string' && cell.v.includes('优秀：')) {
                                            // 确保单元格值包含正确的换行符
                                            cell.v = cell.v.replace(/\\n/g, '\n'); // 替换可能的转义换行符
                                            cell.t = 's'; // 确保是字符串类型
                                        }
                                    });
                                    
                                    // 设置列宽
                                    ws['!cols'] = [
                                        { wch: 15 },  // 第一列（等级说明）- 宽度15足以显示"勉强合格：B"
                                        { wch: 12 },  // 2-11列（学生序号+姓名）
                                        { wch: 12 },
                                        { wch: 12 },
                                        { wch: 12 },
                                        { wch: 12 },
                                        { wch: 12 },
                                        { wch: 12 },
                                        { wch: 12 },
                                        { wch: 12 },
                                        { wch: 12 }
                                    ];
                                    
                                    // 设置行高
                                    ws['!rows'] = [];
                                    
                                    // 记录等级说明区域的行号范围（用于设置更大的行高）
                                    const gradeLegendRowRanges = [];
                                    let currentRow = 2; // 从第3行开始（前2行是标题和空行）
                                    sortedDates.forEach((dateKey) => {
                                        currentRow++; // 跳过日期行
                                        const studentsPerRow = 10;
                                        const totalGroups = Math.ceil(sortedStudents.length / studentsPerRow);
                                        const totalDataRows = totalGroups * 2;
                                        // 记录学生数据行的范围（这些行包含等级说明）
                                        gradeLegendRowRanges.push({
                                            start: currentRow,
                                            end: currentRow + totalDataRows - 1
                                        });
                                        currentRow += totalDataRows; // 跳过学生数据行
                                        currentRow++; // 跳过情况反馈行
                                        currentRow++; // 跳过空行
                                    });
                                    
                                    for (let i = 0; i < sheetData.length; i++) {
                                        const rowData = sheetData[i];
                                        // 标题行行高
                                        if (i === 0) {
                                            ws['!rows'][i] = { hpt: 25 };
                                        }
                                        // 日期行
                                        else if (rowData[0] && typeof rowData[0] === 'string' && (rowData[0].includes('月') && rowData[0].includes('日'))) {
                                            ws['!rows'][i] = { hpt: 20 };
                                        }
                                        // 情况反馈行
                                        else if (rowData[0] && typeof rowData[0] === 'string' && rowData[0].includes('情况反馈')) {
                                            ws['!rows'][i] = { hpt: 20 };
                                        }
                                        // 检查是否是包含等级说明文字的那一行（第一列有等级说明文字）
                                        else if (rowData[0] && typeof rowData[0] === 'string' && rowData[0].includes('优秀：')) {
                                            // 这一行包含等级说明的完整文字，需要足够的高度显示5行
                                            ws['!rows'][i] = { hpt: 90 };  // 设置足够大的行高（5行×18pt=90pt）
                                        }
                                        // 检查是否在等级说明区域内
                                        else if (gradeLegendRowRanges.some(range => i >= range.start && i <= range.end)) {
                                            // 等级说明区域的其他行
                                            ws['!rows'][i] = { hpt: 25 };
                                        }
                                        // 其他所有数据行统一行高
                                        else {
                                            ws['!rows'][i] = { hpt: 18 };
                                        }
                                    }
                                    
                                    // 合并单元格
                                    const merges = [
                                        { s: { r: 0, c: 0 }, e: { r: 0, c: 10 } }  // 标题行合并
                                    ];
                                    
                                    // 为每个日期区块添加合并单元格（重用 currentRow 变量）
                                    currentRow = 2; // 重置为第3行开始（前2行是标题和空行，Excel从0开始计数）
                                    sortedDates.forEach((dateKey, dayIndex) => {
                                        // 日期行的"作业内容："列合并2-10列
                                        merges.push({ s: { r: currentRow, c: 1 }, e: { r: currentRow, c: 10 } });
                                        currentRow++; // 跳过日期行
                                        
                                        // 合并第一列（等级说明列）- 计算实际的行数
                                        const studentsPerRow = 10;
                                        const totalGroups = Math.ceil(sortedStudents.length / studentsPerRow);
                                        const totalDataRows = totalGroups * 2;  // 每组占2行
                                        
                                        // 合并第一列从当前行到数据结束（只合并学生数据行）
                                        if (totalDataRows > 0) {
                                            merges.push({ s: { r: currentRow, c: 0 }, e: { r: currentRow + totalDataRows - 1, c: 0 } });
                                        }
                                        currentRow += totalDataRows; // 跳过学生数据行
                                        
                                        // 情况反馈行合并（横向合并所有列）
                                        merges.push({ s: { r: currentRow, c: 0 }, e: { r: currentRow, c: 10 } });
                                        currentRow++; // 跳过情况反馈行
                                        
                                        // 跳过空行分隔（每个日期后都有一个空行）
                                        currentRow++;
                                    });
                                    
                                    ws['!merges'] = merges;
                                    
                                    // 设置单元格样式 - 确保所有单元格都有样式和边框
                                    const range = XLSX.utils.decode_range(ws['!ref']);
                                    for (let R = range.s.r; R <= range.e.r; ++R) {
                                        for (let C = range.s.c; C <= range.e.c; ++C) {
                                            const cellAddress = XLSX.utils.encode_cell({ r: R, c: C });
                                            
                                            // 确保单元格存在，如果不存在则创建
                                            if (!ws[cellAddress]) {
                                                ws[cellAddress] = { t: 's', v: '' };
                                            }
                                            
                                            if (typeof ws[cellAddress] === 'string') continue;
                                            if (typeof ws[cellAddress] !== 'object') continue;
                                            
                                            const rowData = sheetData[R];
                                            const isGradeLegendCell = C === 0 && rowData && rowData[0] && typeof rowData[0] === 'string' && 
                                                                      (rowData[0].includes('优秀：') || rowData[0].includes('良好：') || 
                                                                       rowData[0].includes('合格：') || rowData[0].includes('不合格：'));
                                            
                                            // 为所有单元格设置基础样式
                                            ws[cellAddress].s = {
                                                alignment: { 
                                                    vertical: 'center',
                                                    horizontal: 'center',
                                                    wrapText: true
                                                },
                                                font: {
                                                    sz: 10,
                                                    name: '宋体'
                                                },
                                                border: {
                                                    top: { style: 'thin', color: { rgb: '000000' } },
                                                    bottom: { style: 'thin', color: { rgb: '000000' } },
                                                    left: { style: 'thin', color: { rgb: '000000' } },
                                                    right: { style: 'thin', color: { rgb: '000000' } }
                                                }
                                            };
                                            
                                            // 标题行加粗
                                            if (R === 0) {
                                                ws[cellAddress].s.font = {
                                                    sz: 14,
                                                    bold: true,
                                                    name: '黑体'
                                                };
                                            }
                                            
                                            // 等级说明列（第一列）特殊样式 - 确保换行和居中
                                            if (isGradeLegendCell) {
                                                ws[cellAddress].s = {
                                                    alignment: { 
                                                        vertical: 'center',  // 垂直居中
                                                        horizontal: 'center', // 水平居中
                                                        wrapText: true        // 自动换行（关键）
                                                    },
                                                    font: {
                                                        sz: 10,
                                                        bold: true,
                                                        name: '宋体'
                                                    },
                                                    fill: {
                                                        fgColor: { rgb: 'F0F0F0' }  // 浅灰色背景
                                                    },
                                                    border: {
                                                        top: { style: 'thin', color: { rgb: '000000' } },
                                                        bottom: { style: 'thin', color: { rgb: '000000' } },
                                                        left: { style: 'thin', color: { rgb: '000000' } },
                                                        right: { style: 'thin', color: { rgb: '000000' } }
                                                    }
                                                };
                                            }
                                        }
                                    }
                                    
                                    // 添加到workbook
                                    XLSX.utils.book_append_sheet(wb, ws, subject);
                                });
                                
                                // 导出文件
                                const periodNames = {
                                    'daily': '当天',
                                    'weekly': '本周',
                                    'custom': '自定义'
                                };
                                const filename = `${className}班作业情况登记表_${periodNames[exportPeriod]}_${new Date().toLocaleDateString()}.xlsx`;
                                XLSX.writeFile(wb, filename, { 
                                    bookType: 'xlsx',
                                    bookSST: false,
                                    type: 'binary',
                                    cellStyles: true
                                });
                                
                                setUploadMessage(`✅ 已导出 ${filename}`);
                                setTimeout(() => setUploadMessage(''), 3000);
                            };
                            
                            const periodNames = {
                                'daily': '当天',
                                'weekly': '本周',
                                'monthly': '本月',
                                'custom': '自定义'
                            };
                            
                            return (
                                <div className="space-y-6">
                                    {/* 标题和时间筛选 */}
                                    <div className="bg-white rounded-xl shadow-lg p-6">
                                        <div className="flex items-center justify-between mb-4">
                                            <h2 className="text-2xl font-bold text-gray-800 flex items-center gap-3">
                                                <svg className="w-8 h-8 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                                                </svg>
                                                作业明细汇总
                                            </h2>
                                            <div className="flex items-center gap-3">
                                                <button
                                                    onClick={exportHomeworkDetail}
                                                    className="flex items-center gap-2 px-6 py-3 bg-gradient-to-r from-purple-500 to-pink-500 text-white rounded-lg hover:from-purple-600 hover:to-pink-600 transition shadow-md font-bold"
                                                >
                                                    <Download size={20} />
                                                    导出Excel
                                                </button>
                                                <div className="relative">
                                                    <button
                                                        onClick={() => setShowGradeExportMenu(!showGradeExportMenu)}
                                                        className="flex items-center gap-2 px-6 py-3 bg-gradient-to-r from-green-500 to-teal-500 text-white rounded-lg hover:from-green-600 hover:to-teal-600 transition shadow-md font-bold"
                                                    >
                                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                                        </svg>

                                                                    >
                                                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                                                        </svg>
                                                                        编辑
                                                                    </button>
                                                                    
                                                                    {/* 删除按钮 */}
                                                                    <button
                                                                        onClick={() => deleteReward(reward.id)}
                                                                        className="px-3 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition font-semibold flex items-center gap-1"
                                                                    >
                                                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                                                        </svg>
                                                                        删除
                                                                    </button>
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                            
                                            {rewards.length === 0 && (
                                                <div className="text-center py-12 text-gray-400">
                                                    <div className="text-6xl mb-4">📦</div>
                                                    <div className="text-lg font-semibold">暂无商品</div>
                                                    <div className="text-sm mt-2">点击上方"添加新商品"开始添加</div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 添加学生对话框 */}
                    {showAddStudentDialog && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4" onClick={() => setShowAddStudentDialog(false)}>
                            <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full" onClick={(e) => e.stopPropagation()}>
                                <div className="bg-gradient-to-r from-blue-500 to-cyan-500 text-white px-8 py-6 rounded-t-2xl">
                                    <h2 className="text-2xl font-bold flex items-center gap-3">
                                        <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                                        </svg>
                                        添加新学生
                                    </h2>
                                </div>
                                
                                <div className="p-8">
                                    <div className="space-y-5">
                                        {/* 姓名输入 */}
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-2">
                                                学生姓名 <span className="text-red-500">*</span>
                                            </label>
                                            <input
                                                type="text"
                                                value={newStudent.name}
                                                onChange={(e) => setNewStudent({...newStudent, name: e.target.value})}
                                                className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none transition"
                                                placeholder="请输入学生姓名"
                                                autoFocus
                                            />
                                        </div>
                                        
                                        {/* 性别选择 */}
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-2">
                                                性别 <span className="text-red-500">*</span>
                                            </label>
                                            <div className="flex gap-4">
                                                <label className="flex items-center gap-2 cursor-pointer">
                                                    <input
                                                        type="radio"
                                                        name="gender"
                                                        value="male"
                                                        checked={newStudent.gender === 'male'}
                                                        onChange={(e) => setNewStudent({...newStudent, gender: e.target.value})}
                                                        className="w-4 h-4 text-blue-500"
                                                    />
                                                    <span className="text-gray-700">男生</span>
                                                </label>
                                                <label className="flex items-center gap-2 cursor-pointer">
                                                    <input
                                                        type="radio"
                                                        name="gender"
                                                        value="female"
                                                        checked={newStudent.gender === 'female'}
                                                        onChange={(e) => setNewStudent({...newStudent, gender: e.target.value})}
                                                        className="w-4 h-4 text-pink-500"
                                                    />
                                                    <span className="text-gray-700">女生</span>
                                                </label>
                                            </div>
                                        </div>
                                        
                                        {/* 小组号输入 */}
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-2">
                                                小组号 <span className="text-red-500">*</span>
                                            </label>
                                            <input
                                                type="number"
                                                value={newStudent.group}
                                                onChange={(e) => setNewStudent({...newStudent, group: e.target.value})}
                                                className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none transition"
                                                placeholder="请输入小组号（1-20）"
                                                min="1"
                                                max="20"
                                            />
                                        </div>
                                        
                                        {/* 初始积分输入 */}
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-2">
                                                初始积分（可选）
                                            </label>
                                            <input
                                                type="number"
                                                value={newStudent.points}
                                                onChange={(e) => setNewStudent({...newStudent, points: e.target.value})}
                                                className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none transition"
                                                placeholder="默认为 0 分"
                                                min="0"
                                            />
                                            <p className="text-xs text-gray-500 mt-1">💡 不填写则默认为 0 分</p>
                                        </div>
                                    </div>
                                    
                                    {/* 按钮组 */}
                                    <div className="flex gap-3 mt-8">
                                        <button
                                            onClick={() => {
                                                setShowAddStudentDialog(false);
                                                setNewStudent({
                                                    name: '',
                                                    gender: '男',
                                                    group: 1,
                                                    points: 0
                                                });
                                            }}
                                            className="flex-1 px-6 py-3 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition font-semibold"
                                        >
                                            取消
                                        </button>
                                        <button
                                            onClick={handleAddStudent}
                                            className="flex-1 px-6 py-3 bg-gradient-to-r from-blue-500 to-cyan-500 text-white rounded-lg hover:from-blue-600 hover:to-cyan-600 transition font-semibold shadow-lg"
                                        >
                                            确认添加
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 修改密码对话框 */}
                    {showPasswordDialog && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full">
                                <div className="bg-gradient-to-r from-purple-500 to-indigo-500 p-6 rounded-t-2xl">
                                    <h3 className="text-2xl font-bold text-white">修改密码</h3>
                                </div>
                                <div className="p-6 space-y-4">
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-2">原密码</label>
                                        <input
                                            type="password"
                                            value={passwordForm.oldPassword}
                                            onChange={(e) => setPasswordForm({...passwordForm, oldPassword: e.target.value})}
                                            className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                                            placeholder="请输入原密码"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-2">新密码</label>
                                        <input
                                            type="password"
                                            value={passwordForm.newPassword}
                                            onChange={(e) => setPasswordForm({...passwordForm, newPassword: e.target.value})}
                                            className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                                            placeholder="请输入新密码（至少6位）"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-2">确认新密码</label>
                                        <input
                                            type="password"
                                            value={passwordForm.confirmPassword}
                                            onChange={(e) => setPasswordForm({...passwordForm, confirmPassword: e.target.value})}
                                            className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                                            placeholder="再次输入新密码"
                                        />
                                    </div>
                                </div>
                                <div className="flex gap-3 p-6 pt-0">
                                    <button
                                        onClick={() => {
                                            setShowPasswordDialog(false);
                                            setPasswordForm({ oldPassword: '', newPassword: '', confirmPassword: '' });
                                        }}
                                        className="flex-1 px-6 py-3 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition font-semibold"
                                    >
                                        取消
                                    </button>
                                    <button
                                        onClick={handleChangePassword}
                                        className="flex-1 px-6 py-3 bg-gradient-to-r from-purple-500 to-indigo-500 text-white rounded-lg hover:from-purple-600 hover:to-indigo-600 transition font-semibold"
                                    >
                                        确认修改
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // 头像查看组件
        const AvatarViewer = ({ studentId, students }) => {
            const [fullImage, setFullImage] = React.useState(null);
            const [loading, setLoading] = React.useState(true);
            
            const student = students.find(s => s.id === studentId);
            
            React.useEffect(() => {
                const loadFullImage = async () => {
                    try {
                        const image = await getAvatarFromIndexedDB(studentId);
                        setFullImage(image);
                    } catch (error) {
                        console.error('加载大图失败:', error);
                    } finally {
                        setLoading(false);
                    }
                };
                
                loadFullImage();
            }, [studentId]);
            
            if (loading) {
                return (
                    <div className="bg-white rounded-lg p-8 flex items-center justify-center">
                        <div className="text-gray-500">加载中...</div>
                    </div>
                );
            }
            
            return (
                <div className="bg-white rounded-lg overflow-hidden">
                    <div className="bg-gradient-to-r from-teal-500 to-cyan-500 p-4 text-white">
                        <h3 className="text-xl font-bold">{student?.name} 的头像</h3>
                    </div>
                    <div className="p-4">
                        {fullImage ? (
                            <img 
                                src={fullImage} 
                                alt={student?.name}
                                className="w-full h-auto rounded-lg"
                            />
                        ) : (
                            <div className="text-center py-8 text-gray-500">
                                未找到头像
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ==================== 主应用组件（包含登录） ====================
        const App = () => {
            const [userInfo, setUserInfo] = useState(null);

            useEffect(() => {
                const saved = localStorage.getItem('userInfo');
                if (saved) {
                    try {
                        const info = JSON.parse(saved);
                        // 如果是年级长账号，清除登录状态
                        if (info.role === 'director') {
                            localStorage.removeItem('userInfo');
                        } else {
                            setUserInfo(info);
                        }
                    } catch (e) {
                        localStorage.removeItem('userInfo');
                    }
                }
            }, []);

            const handleLogin = (info) => {
                setUserInfo(info);
                localStorage.setItem('userInfo', JSON.stringify(info));
            };

            const handleLogout = () => {
                setUserInfo(null);
                localStorage.removeItem('userInfo');
            };

            if (!userInfo) {
                return <LoginPage onLogin={handleLogin} />;
            }

            return <ClassPointSystem userInfo={userInfo} onLogout={handleLogout} />;
        };

        // 渲染应用
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
